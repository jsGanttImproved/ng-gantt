name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # package.json has inconsistent Angular versions (10.0.8, 19.x, ^9 ng-packagr)
      # and TypeScript 3.9.7, but ng-packagr@11 requires TS >=4.0 <4.2.
      # Patch direct deps AND devDeps to a consistent Angular 11 + TS 4.1 set.
      - name: Pin Angular 11 + TypeScript 4.1 in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const v = '11.2.14';
            const ng = ['@angular/animations','@angular/common','@angular/compiler',
                        '@angular/compiler-cli','@angular/core','@angular/forms',
                        '@angular/platform-browser','@angular/platform-browser-dynamic',
                        '@angular/router'];
            ng.forEach(p => {
              if (pkg.dependencies && pkg.dependencies[p])    pkg.dependencies[p] = v;
              if (pkg.devDependencies && pkg.devDependencies[p]) pkg.devDependencies[p] = v;
            });
            if (pkg.devDependencies) {
              pkg.devDependencies['ng-packagr']  = '11.2.0';
              pkg.devDependencies['typescript']  = '4.1.6';
            }
            delete pkg.overrides;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Copy library for app
        run: npm run copy

      - name: Build demo app
        run: npx ng build --prod --base-href /ng-gantt/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Pin Angular 11 + TypeScript 4.1 in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const v = '11.2.14';
            const ng = ['@angular/animations','@angular/common','@angular/compiler',
                        '@angular/compiler-cli','@angular/core','@angular/forms',
                        '@angular/platform-browser','@angular/platform-browser-dynamic',
                        '@angular/router'];
            ng.forEach(p => {
              if (pkg.dependencies && pkg.dependencies[p])    pkg.dependencies[p] = v;
              if (pkg.devDependencies && pkg.devDependencies[p]) pkg.devDependencies[p] = v;
            });
            if (pkg.devDependencies) {
              pkg.devDependencies['ng-packagr']  = '11.2.0';
              pkg.devDependencies['typescript']  = '4.1.6';
            }
            delete pkg.overrides;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Copy library for app
        run: npm run copy

      - name: Build demo app for production
        run: npx ng build --prod --base-href /ng-gantt/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/app
          cname: ''
