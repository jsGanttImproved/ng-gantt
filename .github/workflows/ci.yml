name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ng-packagr@9 (in package.json) uses CJS require() for @angular/compiler-cli,
      # which breaks when Angular 14+ ESM modules land via transitive deps.
      # Install the Angular-11-aligned toolchain explicitly to match the pinned deps.
      - name: Install Angular 11 build toolchain
        run: npm install ng-packagr@11 @angular/compiler-cli@11.2.14 --legacy-peer-deps --no-save

      - name: Build library
        run: npm run build:lib

      - name: Copy library for app
        run: npm run copy

      - name: Build demo app
        run: npx ng build --prod --base-href /ng-gantt/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Angular 11 build toolchain
        run: npm install ng-packagr@11 @angular/compiler-cli@11.2.14 --legacy-peer-deps --no-save

      - name: Build library
        run: npm run build:lib

      - name: Copy library for app
        run: npm run copy

      - name: Build demo app for production
        run: npx ng build --prod --base-href /ng-gantt/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/app
          cname: ''
