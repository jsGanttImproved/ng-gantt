name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # npm (without a lockfile) resolves wildcard/loose ranges to Angular 14+,
      # whose fesm2022 ESM modules cannot be require()'d by ng-packagr@9.
      # npm 8 overrides force every node in the dependency tree to Angular 11
      # before resolution runs, and swap ng-packagr for the Angular-11 release.
      - name: Pin Angular 11 via npm overrides
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.overrides = {
              '@angular/animations':              '11.2.14',
              '@angular/common':                  '11.2.14',
              '@angular/compiler':                '11.2.14',
              '@angular/compiler-cli':            '11.2.14',
              '@angular/core':                    '11.2.14',
              '@angular/forms':                   '11.2.14',
              '@angular/platform-browser':        '11.2.14',
              '@angular/platform-browser-dynamic':'11.2.14',
              '@angular/router':                  '11.2.14',
              'ng-packagr':                       '11.2.0'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Copy library for app
        run: npm run copy

      - name: Build demo app
        run: npx ng build --prod --base-href /ng-gantt/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Pin Angular 11 via npm overrides
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.overrides = {
              '@angular/animations':              '11.2.14',
              '@angular/common':                  '11.2.14',
              '@angular/compiler':                '11.2.14',
              '@angular/compiler-cli':            '11.2.14',
              '@angular/core':                    '11.2.14',
              '@angular/forms':                   '11.2.14',
              '@angular/platform-browser':        '11.2.14',
              '@angular/platform-browser-dynamic':'11.2.14',
              '@angular/router':                  '11.2.14',
              'ng-packagr':                       '11.2.0'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      - name: Copy library for app
        run: npm run copy

      - name: Build demo app for production
        run: npx ng build --prod --base-href /ng-gantt/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/app
          cname: ''
